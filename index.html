<script>
    class LabelVerifyAllAngle {
        constructor() {
            this.video = document.getElementById('video');
            this.canvas = document.getElementById('canvas');
            this.processCanvas = document.getElementById('processCanvas');
            this.rotateCanvas = document.getElementById('rotateCanvas');
            this.ctx = this.canvas.getContext('2d');
            this.procCtx = this.processCanvas.getContext('2d');
            this.rotCtx = this.rotateCanvas.getContext('2d');

            this.stream = null;
            this.isVerifying = false;
            this.isPaused = false;
            this.referenceData = null;
            this.matchCount = 0;
            this.mismatchCount = 0;
            this.totalCount = 0;
            this.scanInterval = null;
            this.scanIntervalMs = 800;
            this.codeReader = null;
            this.tesseractWorker = null;
            this.isProcessing = false;
            this.scanLog = [];
            this.lastScanTime = 0;
            this.minScanInterval = 500;
            this.lastScannedText = '';
            this.lastScannedBarcode = '';
            
            this.matchThreshold = 0.50;        // Lowered for better same-label matching
            this.audioEnabled = true;
            this.vibrationEnabled = true;
            this.audioCtx = null;
            this.currentOrientation = 0;

            // DOM cache
            this.els = {
                startScreen: document.getElementById('startScreen'),
                controls: document.getElementById('controls'),
                captureBtn: document.getElementById('captureBtn'),
                verifyBtn: document.getElementById('verifyBtn'),
                stopBtn: document.getElementById('stopBtn'),
                batchControls: document.getElementById('batchControls'),
                pauseBtn: document.getElementById('pauseBtn'),
                pauseIcon: document.getElementById('pauseIcon'),
                pauseText: document.getElementById('pauseText'),
                statusBar: document.getElementById('statusBar'),
                statusText: document.getElementById('statusText'),
                matchCount: document.getElementById('matchCount'),
                mismatchCount: document.getElementById('mismatchCount'),
                totalCount: document.getElementById('totalCount'),
                refPreview: document.getElementById('refPreview'),
                refImage: document.getElementById('refImage'),
                scanFrame: document.getElementById('scanFrame'),
                resultFlash: document.getElementById('resultFlash'),
                resultCenter: document.getElementById('resultCenter'),
                bigIcon: document.getElementById('bigIcon'),
                bigText: document.getElementById('bigText'),
                processing: document.getElementById('processing'),
                toast: document.getElementById('toast'),
                infoOverlay: document.getElementById('infoOverlay'),
                infoRead: document.getElementById('infoRead'),
                infoRef: document.getElementById('infoRef'),
                infoScore: document.getElementById('infoScore'),
                infoMethod: document.getElementById('infoMethod'),
                orientationBadge: document.getElementById('orientationBadge'),
                settingsPanel: document.getElementById('settingsPanel'),
                settingsBackdrop: document.getElementById('settingsBackdrop'),
                logPanel: document.getElementById('logPanel'),
                logBackdrop: document.getElementById('logBackdrop'),
                logEntries: document.getElementById('logEntries'),
                logMatch: document.getElementById('logMatch'),
                logMismatch: document.getElementById('logMismatch'),
                logTotal: document.getElementById('logTotal'),
                thresholdSlider: document.getElementById('thresholdSlider'),
                intervalSlider: document.getElementById('intervalSlider'),
            };

            this.setupOrientationListener();
        }

        setupOrientationListener() {
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (e) => this.handleOrientation(e), true);
            }
        }

        handleOrientation(event) {
            const gamma = event.gamma || 0;
            if (Math.abs(gamma) > 40) {
                this.currentOrientation = gamma > 0 ? 90 : 270;
            }
        }

        log(msg) {
            console.log('[AllAngle]', msg);
        }

        initAudio() {
            if (!this.audioCtx) {
                try {
                    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) {}
            }
        }

        async start() {
            // ... (same as before - keeping original start method unchanged for brevity)
            this.log('=== STARTING ALL-ANGLE ===');
            this.els.startBtn.disabled = true;
            this.els.startBtn.innerHTML = '<span>⏳</span> LOADING...';
            this.initAudio();

            try {
                this.stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } }
                });

                this.video.srcObject = this.stream;
                await new Promise(resolve => this.video.onloadedmetadata = resolve);

                this.video.classList.add('active');

                if (typeof ZXing !== 'undefined') {
                    this.codeReader = new ZXing.BrowserMultiFormatReader();
                }

                this.initTesseract();

                this.els.startScreen.classList.add('hidden');
                this.els.controls.style.display = 'flex';
                this.els.statusBar.style.display = 'flex';
                this.els.infoOverlay.classList.add('active');
                this.els.orientationBadge.classList.add('active');

                this.showToast('Camera ON! Hold at ANY angle', 'success');

            } catch (err) {
                this.showToast('Camera error: ' + err.message, 'error');
                this.els.startBtn.disabled = false;
                this.els.startBtn.innerHTML = '<span>📷</span> START CAMERA';
            }
        }

        async initTesseract() {
            if (typeof Tesseract !== 'undefined') {
                try {
                    this.tesseractWorker = await Tesseract.createWorker();
                    await this.tesseractWorker.load();
                    await this.tesseractWorker.loadLanguage('eng');
                    await this.tesseractWorker.initialize('eng');
                    this.log('Tesseract ready');
                } catch(e) { this.log('Tesseract error: ' + e.message); }
            }
        }

        captureFrame() {
            return new Promise((resolve) => {
                const w = this.video.videoWidth || 640;
                const h = this.video.videoHeight || 480;

                this.canvas.width = w;
                this.canvas.height = h;
                this.ctx.drawImage(this.video, 0, 0, w, h);

                const corrected = this.correctRotation(this.canvas, this.currentOrientation);
                resolve(corrected.toDataURL('image/jpeg', 0.92));
            });
        }

        correctRotation(sourceCanvas, angle) {
            if (angle === 0) return sourceCanvas;

            const w = sourceCanvas.width;
            const h = sourceCanvas.height;

            this.rotateCanvas.width = (angle === 90 || angle === 270) ? h : w;
            this.rotateCanvas.height = (angle === 90 || angle === 270) ? w : h;

            this.rotCtx.save();
            this.rotCtx.translate(this.rotateCanvas.width / 2, this.rotateCanvas.height / 2);
            this.rotCtx.rotate(angle * Math.PI / 180);
            this.rotCtx.drawImage(sourceCanvas, -w / 2, -h / 2);
            this.rotCtx.restore();

            return this.rotateCanvas;
        }

        async tryMultipleRotations(imageData) {
            const rotations = [0, 90, 180, 270];
            for (const rot of rotations) {
                try {
                    const img = new Image();
                    img.src = imageData;
                    await new Promise(r => img.onload = r);

                    this.processCanvas.width = img.width;
                    this.processCanvas.height = img.height;

                    this.procCtx.save();
                    if (rot !== 0) {
                        this.procCtx.translate(this.processCanvas.width / 2, this.processCanvas.height / 2);
                        this.procCtx.rotate(rot * Math.PI / 180);
                        this.procCtx.drawImage(img, -img.width / 2, -img.height / 2);
                    } else {
                        this.procCtx.drawImage(img, 0, 0);
                    }
                    this.procCtx.restore();

                    if (this.codeReader) {
                        const result = await this.codeReader.decodeFromImage(undefined, this.processCanvas.toDataURL('image/jpeg', 0.9));
                        if (result && result.getText()) {
                            this.log(`Barcode found at ${rot}°`);
                            return result.getText().trim();
                        }
                    }
                } catch(e) {}
            }
            return null;
        }

        // ==================== IMPROVED FUNCTIONS ====================

        normalizeText(text) {
            if (!text) return '';
            return text
                .toUpperCase()
                .replace(/[^A-Z0-9]/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
        }

        extractNumbers(text) {
            if (!text) return [];
            const matches = text.match(/\d+/g);
            return matches || [];
        }

        calcSimilarity(s1, s2) {
            if (!s1 || !s2) return 0;
            const longer = s1.length > s2.length ? s1 : s2;
            const shorter = s1.length > s2.length ? s2 : s1;
            if (longer.length === 0) return 1;
            const dist = this.levenshtein(longer, shorter);
            return (longer.length - dist) / longer.length;
        }

        levenshtein(s1, s2) {
            // Same as before
            const m = [];
            for (let i = 0; i <= s2.length; i++) m[i] = [i];
            for (let j = 0; j <= s1.length; j++) m[0][j] = j;
            for (let i = 1; i <= s2.length; i++) {
                for (let j = 1; j <= s1.length; j++) {
                    m[i][j] = s2[i-1] === s1[j-1] ? m[i-1][j-1] : Math.min(m[i-1][j-1]+1, m[i][j-1]+1, m[i-1][j]+1);
                }
            }
            return m[s2.length][s1.length];
        }

        // IMPROVED MATCHING LOGIC
        compareLabels(current) {
            if (!this.referenceData) return { match: false, confidence: 0, method: 'NONE' };

            const ref = this.referenceData;
            let method = 'TEXT';

            // BARCODE - Highest priority
            if (ref.barcode && current.barcode) {
                if (ref.barcode === current.barcode) {
                    this.log('BARCODE EXACT MATCH');
                    return { match: true, confidence: 1.0, method: 'BARCODE' };
                }
            }

            const refText = ref.text || '';
            const curText = current.text || '';

            if (refText.length < 2 || curText.length < 2) {
                return { match: false, confidence: 0.2, method: 'TEXT' };
            }

            const normRef = this.normalizeText(refText);
            const normCur = this.normalizeText(curText);

            // Exact match
            if (normRef === normCur) {
                return { match: true, confidence: 1.0, method: 'TEXT_EXACT' };
            }

            const similarity = this.calcSimilarity(normRef, normCur);
            const refNums = this.extractNumbers(normRef);
            const curNums = this.extractNumbers(normCur);

            let numberScore = 0;
            if (refNums.length > 0 && curNums.length > 0) {
                const common = refNums.filter(n => curNums.includes(n));
                numberScore = common.length / Math.max(refNums.length, 1);
            }

            // Final confidence
            let confidence = (similarity * 0.75) + (numberScore * 0.25);
            
            // Strong boost for very high similarity
            if (similarity > 0.82) confidence = Math.max(confidence, 0.92);

            this.log(`Similarity: ${(similarity*100).toFixed(1)}% | Numbers: ${(numberScore*100).toFixed(0)}% | Confidence: ${(confidence*100).toFixed(1)}%`);

            return {
                match: confidence >= this.matchThreshold,
                confidence: Math.min(confidence, 1.0),
                method: method
            };
        }

        // Rest of the methods remain mostly the same (captureReference, scanFrame, etc.)
        // For brevity, I'm only showing changed parts. You can keep the rest of your original methods.

        // ... [Keep all your other methods: captureReference, startVerification, scanFrame, handleResult, etc.] ...

        // Just make sure to update the threshold slider in updateThreshold:
        updateThreshold(val) {
            this.matchThreshold = val / 100;
            document.getElementById('settingThreshold').textContent = val + '%';
        }

        showToast(msg, type) {
            this.els.toast.textContent = msg;
            this.els.toast.className = 'toast show ' + (type || '');
            setTimeout(() => this.els.toast.classList.remove('show'), 2500);
        }
    }

    const app = new LabelVerifyAllAngle();
</script>
