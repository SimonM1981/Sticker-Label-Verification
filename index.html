<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sticker Label Verify PRO</title>
    <script src="https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/umd/index.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: #000; color: white; overflow: hidden; height: 100vh; }
        
        /* UI Layout */
        #app-container { display: flex; flex-direction: column; height: 100%; }
        .header { background: linear-gradient(135deg, #1a237e 0%, #0d47a1 100%); padding: 10px; text-align: center; z-index: 100; }
        .header h1 { font-size: 16px; font-weight: 800; }
        
        .main-content { flex: 1; position: relative; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Scan Elements */
        .scan-frame { position: absolute; inset: 15% 10% 25% 10%; border: 2px solid rgba(255,255,255,0.3); border-radius: 12px; pointer-events: none; z-index: 10; }
        .result-flash { position: absolute; inset: 0; z-index: 50; pointer-events: none; opacity: 0; transition: opacity 0.1s; }
        .result-flash.match { background: rgba(0, 230, 118, 0.3); opacity: 1; }
        .result-flash.mismatch { background: rgba(255, 23, 68, 0.3); opacity: 1; }

        /* HUD */
        .status-bar { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; gap: 5px; z-index: 20; }
        .pill { background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; border: 1px solid rgba(255,255,255,0.2); }
        .match-count { color: #00e676; } .mismatch-count { color: #ff1744; }

        /* Controls */
        .controls { background: #0d1117; padding: 15px; display: flex; flex-direction: column; gap: 10px; border-top: 2px solid #30363d; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 800; color: white; cursor: pointer; text-transform: uppercase; }
        .btn-primary { background: linear-gradient(135deg, #2962ff 0%, #0039cb 100%); }
        .btn-success { background: linear-gradient(135deg, #00c853 0%, #009624 100%); }
        .btn-danger { background: #b71c1c; }
        
        canvas { display: none; }
        #processing-indicator { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 10px; display: none; z-index: 60; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="header">
        <h1>📦 LABEL VERIFY PRO</h1>
    </div>

    <div class="main-content">
        <video id="video" autoplay playsinline muted></video>
        <div class="scan-frame"></div>
        <div id="flash" class="result-flash"></div>
        
        <div class="status-bar">
            <div id="status-pill" class="pill">READY</div>
            <div id="match-pill" class="pill match-count">✓ 0</div>
            <div id="mismatch-pill" class="pill mismatch-count">✗ 0</div>
        </div>

        <div id="processing-indicator">SCANNING...</div>
    </div>

    <div class="controls">
        <button id="action-btn" class="btn btn-primary" onclick="app.handleMainAction()">Start Camera</button>
        <button id="reset-btn" class="btn btn-danger" style="display:none" onclick="location.reload()">Reset All</button>
    </div>
</div>

<canvas id="proc-canvas"></canvas>

<script>
class LabelVerifyPro {
    constructor() {
        this.video = document.getElementById('video');
        this.canvas = document.getElementById('proc-canvas');
        this.ctx = this.canvas.getContext('2d', { willReadFrequently: true });
        this.actionBtn = document.getElementById('action-btn');
        this.statusPill = document.getElementById('status-pill');
        this.indicator = document.getElementById('processing-indicator');
        
        this.worker = null;
        this.codeReader = new ZXing.BrowserMultiFormatReader();
        this.state = 'INIT'; // INIT -> CAPTURING -> VERIFYING
        this.referenceData = null;
        this.matches = 0;
        this.mismatches = 0;
        this.isBusy = false;
    }

    async handleMainAction() {
        if (this.state === 'INIT') {
            this.actionBtn.disabled = true;
            this.statusPill.innerText = "LOADING AI...";
            await this.setupCamera();
            await this.setupOCR();
            this.state = 'CAPTURING';
            this.statusPill.innerText = "READY: CAPTURE REF";
            this.actionBtn.innerText = "Capture Reference Label";
            this.actionBtn.disabled = false;
        } else if (this.state === 'CAPTURING') {
            this.captureReference();
        }
    }

    async setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        this.video.srcObject = stream;
    }

    async setupOCR() {
        this.worker = await Tesseract.createWorker();
        await this.worker.loadLanguage('eng');
        await this.worker.setParameters({
            tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-',
        });
    }

    async captureReference() {
        this.indicator.style.display = 'block';
        const result = await this.performScan();
        this.indicator.style.display = 'none';

        if (result) {
            this.referenceData = result;
            this.state = 'VERIFYING';
            this.actionBtn.innerText = "SCANNING MODE ACTIVE";
            this.actionBtn.className = "btn btn-success";
            document.getElementById('reset-btn').style.display = 'block';
            this.statusPill.innerText = "REF: " + result;
            this.startContinuousScan();
        } else {
            alert("Could not read label. Please hold steady and ensure good lighting.");
        }
    }

    async performScan() {
        // 1. Try Barcode (at any angle)
        try {
            const result = await this.codeReader.decodeFromVideoElement(this.video);
            if (result) return result.text;
        } catch (e) {}

        // 2. Try OCR with Image Pre-processing
        this.canvas.width = this.video.videoWidth;
        this.canvas.height = this.video.videoHeight;
        this.ctx.drawImage(this.video, 0, 0);
        
        // Manual Contrast boost for angled labels
        const imageData = this.ctx.getImageData(0,0,this.canvas.width,this.canvas.height);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
            const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
            const v = brightness > 125 ? 255 : 0;
            data[i] = data[i+1] = data[i+2] = v;
        }
        this.ctx.putImageData(imageData, 0, 0);

        const { data: { text } } = await this.worker.recognize(this.canvas);
        return text.replace(/[^A-Z0-9]/g, '').trim();
    }

    async startContinuousScan() {
        if (this.state !== 'VERIFYING') return;

        if (!this.isBusy) {
            this.isBusy = true;
            const scanned = await this.performScan();
            if (scanned && scanned.length > 2) {
                this.compare(scanned);
            }
            this.isBusy = false;
        }
        // Scan every 400ms for production speed
        setTimeout(() => this.startContinuousScan(), 400);
    }

    compare(scanned) {
        const ref = this.referenceData.toUpperCase();
        const cur = scanned.toUpperCase();
        
        // Fuzzy Matching (Checks if the ID is contained in the read or within 1 character error)
        const isMatch = cur.includes(ref) || ref.includes(cur);

        if (isMatch) {
            this.matches++;
            document.getElementById('match-pill').innerText = `✓ ${this.matches}`;
            this.triggerFlash('match');
            this.feedback(true);
        } else {
            this.mismatches++;
            document.getElementById('mismatch-pill').innerText = `✗ ${this.mismatches}`;
            this.triggerFlash('mismatch');
            this.feedback(false);
        }
    }

    triggerFlash(type) {
        const f = document.getElementById('flash');
        f.className = `result-flash ${type}`;
        setTimeout(() => f.className = 'result-flash', 200);
    }

    feedback(success) {
        // Haptic feedback for mobile
        if (navigator.vibrate) navigator.vibrate(success ? 50 : [100, 50, 100]);
        
        // Audio Beep
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = success ? 880 : 220;
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.2);
        osc.stop(ctx.currentTime + 0.2);
    }
}

const app = new LabelVerifyPro();
</script>
</body>
</html>
