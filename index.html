<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Label Verify PRO - Enhanced</title>
    <script src="https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/umd/index.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; color: white; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #video-container { position: relative; flex: 1; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Overlay UI */
        .scan-overlay { position: absolute; inset: 0; border: 2px solid rgba(255,255,255,0.2); pointer-events: none; z-index: 5; }
        .match-flash { position: absolute; inset: 0; z-index: 10; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
        .match-flash.match { background: rgba(0, 255, 0, 0.3); opacity: 1; }
        .match-flash.error { background: rgba(255, 0, 0, 0.3); opacity: 1; }

        .controls { background: #111; padding: 20px; border-top: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; color: white; }
        .btn-primary { background: #2962ff; }
        .btn-success { background: #00c853; }
        .btn-danger { background: #d50000; }
        
        #status-bar { position: absolute; top: 10px; width: 95%; left: 2.5%; display: flex; justify-content: space-between; z-index: 20; }
        .pill { background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 20px; font-size: 12px; border: 1px solid #444; }
        
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="status-bar">
        <div class="pill" id="mode-text">IDLE</div>
        <div class="pill" id="count-text">MATCHES: 0</div>
    </div>

    <div id="video-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="scan-overlay"></div>
        <div id="flash" class="match-flash"></div>
    </div>

    <canvas id="proc-canvas"></canvas>

    <div class="controls">
        <button id="main-btn" class="btn btn-primary" onclick="app.handleAction()">START CAMERA</button>
        <button id="reset-btn" class="btn btn-danger" style="display:none;" onclick="app.reset()">RESET</button>
    </div>

    <script>
        class LabelVerifyApp {
            constructor() {
                this.video = document.getElementById('video');
                this.canvas = document.getElementById('proc-canvas');
                this.ctx = this.canvas.getContext('2d', { willReadFrequently: true });
                this.flash = document.getElementById('flash');
                this.mainBtn = document.getElementById('main-btn');
                
                this.worker = null;
                this.codeReader = new ZXing.BrowserMultiFormatReader();
                
                this.state = 'START'; // START, CAPTURE, VERIFYING
                this.referenceData = null;
                this.matchCount = 0;
                this.isProcessing = false;
            }

            async initOCR() {
                this.updateStatus("Initializing AI...");
                this.worker = await Tesseract.createWorker();
                await this.worker.loadLanguage('eng');
                await this.worker.setParameters({
                    tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-',
                });
                this.updateStatus("Ready");
            }

            async handleAction() {
                if (this.state === 'START') {
                    await this.startCamera();
                    await this.initOCR();
                    this.state = 'CAPTURE';
                    this.mainBtn.innerText = "CAPTURE REFERENCE LABEL";
                } else if (this.state === 'CAPTURE') {
                    this.captureReference();
                }
            }

            async startCamera() {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                this.video.srcObject = stream;
            }

            async captureReference() {
                this.updateStatus("Reading Reference...");
                const data = await this.scanFrame();
                if (data) {
                    this.referenceData = data;
                    this.state = 'VERIFYING';
                    this.mainBtn.innerText = "SCANNING BATCH...";
                    this.mainBtn.className = "btn btn-success";
                    document.getElementById('reset-btn').style.display = 'block';
                    this.startBatchLoop();
                } else {
                    alert("Could not see label clearly. Try a different angle.");
                }
            }

            async scanFrame() {
                // Try Barcode first (Immediate)
                try {
                    const result = await this.codeReader.decodeFromVideoElement(this.video);
                    if (result) return result.text;
                } catch (e) {}

                // Fallback to OCR with Image Enhancement
                this.canvas.width = this.video.videoWidth;
                this.canvas.height = this.video.videoHeight;
                this.ctx.drawImage(this.video, 0, 0);
                
                this.enhanceImage(); // Boost contrast for angled reads
                
                const { data: { text } } = await this.worker.recognize(this.canvas);
                const cleanText = text.replace(/[^A-Z0-9]/g, '').trim();
                return cleanText.length > 3 ? cleanText : null;
            }

            enhanceImage() {
                const imageData = this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const avg = (data[i] + data[i+1] + data[i+2]) / 3;
                    const val = avg > 120 ? 255 : 0; // Simple binary threshold
                    data[i] = data[i+1] = data[i+2] = val;
                }
                this.ctx.putImageData(imageData, 0, 0);
            }

            async startBatchLoop() {
                if (this.state !== 'VERIFYING') return;
                
                if (!this.isProcessing) {
                    this.isProcessing = true;
                    const scanned = await this.scanFrame();
                    if (scanned) {
                        this.validate(scanned);
                    }
                    this.isProcessing = false;
                }
                
                setTimeout(() => this.startBatchLoop(), 300);
            }

            validate(scanned) {
                const ref = this.referenceData.toUpperCase();
                const cur = scanned.toUpperCase();
                
                // Fuzzy Match: Exact, Contains, or Levenshtein distance < 2
                const isMatch = cur.includes(ref) || ref.includes(cur) || this.levenshtein(cur, ref) < 2;

                if (isMatch) {
                    this.matchCount++;
                    document.getElementById('count-text').innerText = `MATCHES: ${this.matchCount}`;
                    this.triggerUI('match');
                    this.beep(800, 100);
                } else {
                    this.triggerUI('error');
                    this.beep(200, 500);
                }
            }

            levenshtein(s, t) {
                if (!s.length) return t.length;
                if (!t.length) return s.length;
                const arr = [];
                for (let i = 0; i <= t.length; i++) { arr[i] = [i]; }
                for (let j = 0; j <= s.length; j++) { arr[0][j] = j; }
                for (let i = 1; i <= t.length; i++) {
                    for (let j = 1; j <= s.length; j++) {
                        arr[i][j] = t.charAt(i-1) === s.charAt(j-1) ? arr[i-1][j-1] : Math.min(arr[i-1][j-1]+1, arr[i][j-1]+1, arr[i-1][j]+1);
                    }
                }
                return arr[t.length][s.length];
            }

            triggerUI(type) {
                this.flash.className = `match-flash ${type}`;
                setTimeout(() => this.flash.className = 'match-flash', 400);
            }

            beep(freq, dur) {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                osc.type = 'square';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                osc.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + (dur/1000));
            }

            updateStatus(msg) { document.getElementById('mode-text').innerText = msg.toUpperCase(); }

            reset() { location.reload(); }
        }

        const app = new LabelVerifyApp();
    </script>
</body>
</html>
