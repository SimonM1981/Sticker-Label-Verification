<script>
// Global variables
let masterText = "";
let isAutoScanning = false;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const scanFrame = document.getElementById('scanFrame');
const logBox = document.getElementById('log');

async function init() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { 
                facingMode: 'environment', 
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }
        });
        video.srcObject = stream;
        video.play();
        
        // Wait for video to be ready
        await new Promise(resolve => {
            video.onloadedmetadata = resolve;
        });
        
        addLog("Camera initialized successfully", "#3b82f6");
    } catch (err) {
        addLog("Camera Error: " + err.message, "#ef4444");
        console.error(err);
    }
}

function addLog(msg, color = "#aaa") {
    const time = new Date().toLocaleTimeString([], { 
        hour: '2-digit', 
        minute: '2-digit',
        second: '2-digit' 
    });
    logBox.innerHTML = `<div style="color:${color}">[${time}] ${msg}</div>` + logBox.innerHTML;
    
    // Optional: limit log entries to prevent memory issues
    if (logBox.children.length > 50) {
        logBox.removeChild(logBox.lastChild);
    }
}

// Clean text: remove special characters, extra spaces, and convert to lowercase
function clean(text) {
    if (!text) return "";
    return text.toLowerCase()
               .replace(/[^a-z0-9]/g, '')
               .trim();
}

async function performOCR() {
    if (!video.videoWidth || !video.videoHeight) return null;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    try {
        // Make sure Tesseract.js is loaded
        if (typeof Tesseract === 'undefined') {
            addLog("Tesseract.js not loaded!", "#ef4444");
            return null;
        }

        const result = await Tesseract.recognize(canvas, 'eng', {
            logger: m => console.log(m) // optional: see progress
        });
        
        return result.data.text.trim();
    } catch (e) {
        console.error("OCR Error:", e);
        addLog("OCR Error occurred", "#ef4444");
        return null;
    }
}

async function captureMaster() {
    scanFrame.className = "scan-frame status-reading";
    addLog("Reading Master label...");

    const rawText = await performOCR();
    
    if (rawText && rawText.length > 3) {
        masterText = clean(rawText);
        
        document.getElementById('masterStatus').innerText = 
            "MASTER SET: " + (masterText.length > 20 ? masterText.substring(0, 20) + "..." : masterText);
        
        document.getElementById('masterBtn').style.display = "none";
        document.getElementById('resetBtn').style.display = "inline-block";

        addLog(`Master captured: ${masterText}`, "#22c55e");
        addLog("Starting auto-scan...", "#3b82f6");
        
        startAutoScan();
    } else {
        addLog("Failed to read Master. Please improve lighting or positioning.", "#ef4444");
        scanFrame.className = "scan-frame status-idle";
    }
}

async function startAutoScan() {
    if (isAutoScanning) return;
    
    isAutoScanning = true;
    document.getElementById('autoStatus').innerText = "⚡ AUTO-SCAN ACTIVE";

    while (isAutoScanning) {
        scanFrame.className = "scan-frame status-reading";
        
        const rawSample = await performOCR();
        
        if (rawSample && rawSample.length > 3) {
            const sampleClean = clean(rawSample);
            
            // Fuzzy matching
            const isMatch = 
                sampleClean.includes(masterText) ||
                masterText.includes(sampleClean) ||
                calculateSimilarity(sampleClean, masterText) > 0.75;   // lowered threshold slightly for practicality

            if (isMatch) {
                scanFrame.className = "scan-frame status-pass";
                addLog("PASS: Match detected", "#22c55e");
            } else {
                scanFrame.className = "scan-frame status-fail";
                addLog(`FAIL: No match | Sample: ${sampleClean.substring(0, 25)}${sampleClean.length > 25 ? '...' : ''}`, "#ef4444");
                
                if (navigator.vibrate) {
                    navigator.vibrate([100, 50, 100]);
                }
            }
        } else {
            addLog("Could not read text from camera", "#eab308");
        }

        // Pause between scans
        await new Promise(resolve => setTimeout(resolve, 1500));
        
        if (isAutoScanning) {
            scanFrame.className = "scan-frame status-idle";
        }
    }
}

// Levenshtein distance + similarity
function calculateSimilarity(s1, s2) {
    if (!s1 || !s2) return 0;
    
    const longer = s1.length > s2.length ? s1 : s2;
    const shorter = s1.length > s2.length ? s2 : s1;
    
    if (longer.length === 0) return 1.0;
    
    const distance = editDistance(longer, shorter);
    return (longer.length - distance) / longer.length;
}

function editDistance(s1, s2) {
    if (s1.length < s2.length) [s1, s2] = [s2, s1];
    
    let costs = Array.from({ length: s2.length + 1 }, (_, i) => i);
    
    for (let i = 0; i < s1.length; i++) {
        let lastValue = i + 1;
        for (let j = 0; j < s2.length; j++) {
            const temp = costs[j];
            costs[j] = s1[i] === s2[j] 
                ? lastValue - 1 
                : Math.min(costs[j], costs[j + 1], lastValue) + 1;
            lastValue = temp;
        }
        costs[s2.length] = Math.min(costs[s2.length], lastValue) + 1;
    }
    
    return costs[s2.length];
}

// Reset function (add this button handler)
function resetMaster() {
    isAutoScanning = false;
    masterText = "";
    
    document.getElementById('masterStatus').innerText = "No master set";
    document.getElementById('autoStatus').innerText = "Auto-scan inactive";
    document.getElementById('masterBtn').style.display = "inline-block";
    document.getElementById('resetBtn').style.display = "none";
    
    scanFrame.className = "scan-frame status-idle";
    addLog("System reset", "#eab308");
}

// Initialize when page loads
window.onload = init;
</script>
