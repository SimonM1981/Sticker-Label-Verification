<script>
const video = document.getElementById('video');
const logBox = document.getElementById('log');

function addLog(msg, color = "#aaa") {
    const time = new Date().toLocaleTimeString();
    logBox.innerHTML = `<div style="color:${color}">[${time}] ${msg}</div>` + logBox.innerHTML;
}

async function initCamera() {
    try {
        addLog("Requesting camera...", "#3b82f6");
        
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });
        
        video.srcObject = stream;
        addLog("Camera started successfully ✓", "#22c55e");
        
    } catch (err) {
        addLog("Camera failed: " + err.message, "#ef4444");
    }
}

window.onload = initCamera;
</script>
