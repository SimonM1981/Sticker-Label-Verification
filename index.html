<script>
// Global variables
let masterText = "";
let isAutoScanning = false;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const scanFrame = document.getElementById('scanFrame');
const logBox = document.getElementById('log');

async function init() {
    try {
        addLog("Requesting camera access...", "#3b82f6");

        const stream = await navigator.mediaDevices.getUserMedia({
            video: { 
                facingMode: 'environment', 
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }
        });

        video.srcObject = stream;
        video.play();

        video.onloadedmetadata = () => {
            addLog("Camera started successfully ✓", "#22c55e");
            addLog(`Video resolution: ${video.videoWidth} × ${video.videoHeight}`);
        };

    } catch (err) {
        addLog("Camera Error: " + err.message, "#ef4444");
        console.error(err);
    }
}

function addLog(msg, color = "#aaa") {
    const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    logBox.innerHTML = `<div style="color:${color}">[${time}] ${msg}</div>` + logBox.innerHTML;
    
    if (logBox.children.length > 40) logBox.removeChild(logBox.lastChild);
}

function clean(text) {
    if (!text) return "";
    return text.toLowerCase().replace(/[^a-z0-9]/g, '').trim();
}

async function performOCR() {
    if (!video.videoWidth || video.videoWidth === 0) {
        addLog("Video not ready yet", "#eab308");
        return null;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    try {
        if (typeof Tesseract === "undefined") {
            addLog("ERROR: Tesseract.js is not loaded! Check your <script> tag.", "#ef4444");
            return null;
        }

        addLog("Running OCR...", "#aaa");

        const result = await Tesseract.recognize(canvas, 'eng', {
            logger: (m) => { if (m.status === 'recognizing text') console.log(m); }
        });

        const text = result.data.text.trim();
        addLog(`OCR raw result: "${text.substring(0, 60)}${text.length > 60 ? '...' : ''}"`, "#aaa");
        return text;

    } catch (e) {
        console.error("OCR Error:", e);
        addLog("OCR failed: " + e.message, "#ef4444");
        return null;
    }
}

// Rest of the functions (captureMaster, startAutoScan, etc.) remain mostly the same
// I'll keep them short here for brevity:

async function captureMaster() {
    scanFrame.className = "scan-frame status-reading";
    addLog("Attempting to read Master...");

    const rawText = await performOCR();
    
    if (rawText && rawText.length > 4) {
        masterText = clean(rawText);
        document.getElementById('masterStatus').innerText = "MASTER SET: " + masterText.substring(0, 25);
        document.getElementById('masterBtn').style.display = "none";
        document.getElementById('resetBtn').style.display = "inline-block";
        addLog("Master captured successfully!", "#22c55e");
        startAutoScan();
    } else {
        addLog("Failed to read any text. Check lighting, focus, and camera permission.", "#ef4444");
        scanFrame.className = "scan-frame status-idle";
    }
}

async function startAutoScan() {
    isAutoScanning = true;
    document.getElementById('autoStatus').innerText = "⚡ AUTO-SCAN ACTIVE";

    while (isAutoScanning) {
        scanFrame.className = "scan-frame status-reading";
        const rawSample = await performOCR();

        if (rawSample && rawSample.length > 3) {
            const sampleClean = clean(rawSample);
            const similarity = calculateSimilarity(sampleClean, masterText);

            const isMatch = sampleClean.includes(masterText) || 
                            masterText.includes(sampleClean) || 
                            similarity > 0.75;

            if (isMatch) {
                scanFrame.className = "scan-frame status-pass";
                addLog("PASS - Match found", "#22c55e");
            } else {
                scanFrame.className = "scan-frame status-fail";
                addLog(`FAIL - Similarity: ${(similarity*100).toFixed(0)}%`, "#ef4444");
            }
        }

        await new Promise(r => setTimeout(r, 1800));
        if (isAutoScanning) scanFrame.className = "scan-frame status-idle";
    }
}

// Keep the same calculateSimilarity and editDistance functions from before

window.onload = init;
</script>
